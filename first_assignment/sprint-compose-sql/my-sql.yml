services:
    db:
        image: mysql:9.2
        ports: 
            - 3306:3306
        environment:
            - MYSQL_USER=petclinic
            - MYSQL_PASSWORD=petclinic
            - MYSQL_ROOT_PASSWORD=root
            - MYSQL_DATABASE=petclinic
        volumes:
            - mysql_data:/var/lib/mysql 
        container_name: MYSQL_DB
        
        
    web:
        image: spring-petclinic:latest
        container_name: front_app
        depends_on:
            - db
        ports:
          - 8080:8080
volumes:
    mysql_data:

